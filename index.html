<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fu — field notes</title>
  <meta name="description" content="an archive of looking.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --fg: #e8e8e8;
      --fg-dim: #8a8a8a;
      --muted: #4a4a4a;
      --serif: 'Newsreader', Georgia, 'Times New Roman', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 16px; }

    body {
      font-family: var(--serif);
      background: var(--bg);
      color: var(--fg);
      font-weight: 300;
      line-height: 1.55;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
      transition: border-color .2s ease, color .2s ease;
    }
    a:hover { border-color: var(--fg); color: var(--fg); }

    ::selection { background: var(--fg); color: var(--bg); }

    /* ---------- header ---------- */
    header {
      padding: 2rem 2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .mark {
      font-weight: 400;
      font-size: 1.15rem;
      letter-spacing: 0;
    }
    .mark em {
      font-style: italic;
      color: var(--fg-dim);
      font-weight: 300;
      margin-left: 0.5ch;
    }

    /* ---------- statement ---------- */
    .statement {
      padding: 5rem 2rem 4rem;
      max-width: 60ch;
    }
    .statement p {
      font-size: 1.3rem;
      line-height: 1.55;
      margin-bottom: 1rem;
      font-weight: 300;
    }
    .statement p.dim {
      color: var(--fg-dim);
      font-style: italic;
    }
    .statement .sig {
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: 1rem;
      font-style: italic;
    }

    /* ---------- stream ---------- */
    .stream {
      padding: 3rem 2rem 7rem;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      column-gap: 1.25rem;
      row-gap: 4.5rem;
    }

    .frame {
      position: relative;
    }

    .plate {
      position: relative;
      background: #0a0a0a;
      overflow: hidden;
      cursor: zoom-in;
      outline: 1px solid transparent;
      outline-offset: 0;
      transition: outline-color .3s ease, outline-offset .3s ease;
    }
    .plate:hover {
      outline-color: var(--fg-dim);
      outline-offset: 8px;
    }

    .plate::before {
      content: '';
      display: block;
      padding-bottom: var(--aspect, 66.66%);
    }

    .plate img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity .6s ease;
    }
    .plate img.loaded { opacity: 1; }

    /* ---------- grid variants ---------- */
    .w-4  { grid-column: span 4; }
    .w-5  { grid-column: span 5; }
    .w-6  { grid-column: span 6; }
    .w-7  { grid-column: span 7; }
    .w-8  { grid-column: span 8; }
    .w-9  { grid-column: span 9; }
    .w-10 { grid-column: span 10; }
    .w-12 { grid-column: span 12; }

    .off-1 { grid-column-start: 2; }
    .off-2 { grid-column-start: 3; }
    .off-3 { grid-column-start: 4; }
    .off-4 { grid-column-start: 5; }
    .off-5 { grid-column-start: 6; }
    .off-6 { grid-column-start: 7; }

    .a-32  { --aspect: 66.66%; }
    .a-23  { --aspect: 150%; }
    .a-11  { --aspect: 100%; }
    .a-43  { --aspect: 75%; }
    .a-34  { --aspect: 133.33%; }
    .a-169 { --aspect: 56.25%; }
    .a-219 { --aspect: 42.85%; }

    @media (max-width: 900px) {
      header { padding: 1.25rem 1.25rem 1rem; }
      .statement { padding: 3rem 1.25rem 2rem; }
      .statement p { font-size: 1.1rem; }
      .stream {
        padding: 1.5rem 1.25rem 4rem;
        column-gap: 0;
        row-gap: 2.75rem;
      }
      .w-4, .w-5, .w-6, .w-7, .w-8, .w-9, .w-10 { grid-column: span 12; }
      .off-1, .off-2, .off-3, .off-4, .off-5, .off-6 { grid-column-start: 1; }
      footer { padding: 3rem 1.25rem 3rem !important; }
    }

    /* ---------- footer ---------- */
    footer {
      padding: 5rem 2rem 4rem;
      font-size: 0.95rem;
      color: var(--fg-dim);
      display: flex;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
      font-weight: 300;
    }
    footer .copy {
      color: var(--muted);
      font-style: italic;
    }

    /* ---------- lightbox ---------- */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.99);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 4rem 3.5rem;
    }
    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      cursor: zoom-out;
    }

    .lb-close, .lb-nav {
      position: absolute;
      background: none;
      border: none;
      color: var(--fg-dim);
      font-family: inherit;
      font-style: italic;
      font-size: 1rem;
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      transition: color .15s ease;
    }
    .lb-close:hover, .lb-nav:hover { color: var(--fg); }

    .lb-close { top: 1.5rem; right: 1.5rem; }
    .lb-nav {
      top: 50%;
      transform: translateY(-50%);
      padding: 2rem 1rem;
      font-size: 1.3rem;
      font-style: normal;
    }
    .lb-prev { left: 0.75rem; }
    .lb-next { right: 0.75rem; }

    @media (max-width: 900px) {
      .lightbox { padding: 3rem 0.75rem; }
      .lb-nav { padding: 1rem 0.5rem; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="mark">fu<em>— field notes</em></div>
</header>

<section class="statement">
  <p>an archive of looking. people i met, people i know, the light that found them.</p>
  <p class="dim">film and digital, no plan, no theme. ongoing.</p>
  <div class="sig">— fu</div>
</section>

<main class="stream" id="stream">
  <!-- frames rendered by JS -->
</main>

<footer>
  <div>a project by <a href="https://aikhojestudios.github.io/RealEstate/" target="_blank" rel="noopener">aikhoje studios</a></div>
  <div><a href="mailto:aikhojestudios@gmail.com">aikhojestudios@gmail.com</a></div>
  <div class="copy">© fu</div>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
  <button class="lb-close" id="lbClose" aria-label="Close">close</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous">←</button>
  <button class="lb-nav lb-next" id="lbNext" aria-label="Next">→</button>
  <img id="lbImg" src="" alt="">
</div>

<script>
  // ================================================================
  // FRAME CONFIG — edit this array to manage your stream.
  // Each frame: { src, w, off, a }
  //   w   = grid column span: 4, 5, 6, 7, 8, 9, 10, or 12
  //   off = optional left offset column: null or 1–6
  //   a   = aspect ratio: a-32 | a-23 | a-11 | a-43 | a-34 | a-169 | a-219
  // Captions intentionally omitted — images only.
  // ================================================================
  const frames = [
    { src: "images/001.jpg", w: 6,  off: 3,    a: "a-23" },
    { src: "images/002.jpg", w: 8,  off: 2,    a: "a-11" },
    { src: "images/003.jpg", w: 12, off: null, a: "a-32" },
    { src: "images/004.jpg", w: 6,  off: null, a: "a-11" },
    { src: "images/005.jpg", w: 6,  off: 7,    a: "a-32" },
    { src: "images/006.jpg", w: 7,  off: 2,    a: "a-11" },
    { src: "images/007.jpg", w: 4,  off: null, a: "a-11" },
    { src: "images/008.jpg", w: 7,  off: 5,    a: "a-32" },
    { src: "images/009.jpg", w: 12, off: null, a: "a-32" },
    { src: "images/010.png", w: 5,  off: null, a: "a-11" },
    { src: "images/011.jpg", w: 7,  off: 6,    a: "a-32" },
    { src: "images/012.jpg", w: 12, off: null, a: "a-32" },
    { src: "images/013.jpg", w: 6,  off: 3,    a: "a-11" },
    { src: "images/014.jpg", w: 5,  off: null, a: "a-23" },
    { src: "images/015.jpg", w: 5,  off: 7,    a: "a-11" },
    { src: "images/016.jpg", w: 10, off: 1,    a: "a-32" },
    { src: "images/017.jpg", w: 5,  off: 4,    a: "a-23" },
    { src: "images/018.jpg", w: 6,  off: null, a: "a-11" },
    { src: "images/019.jpg", w: 12, off: null, a: "a-11" },
    { src: "images/020.jpg", w: 8,  off: 3,    a: "a-32" },
    { src: "images/021.jpg", w: 5,  off: null, a: "a-23" },
    { src: "images/022.jpg", w: 6,  off: 6,    a: "a-32" },
    { src: "images/023.jpg", w: 6,  off: null, a: "a-11" },
    { src: "images/024.jpg", w: 6,  off: 6,    a: "a-32" },
    { src: "images/025.jpg", w: 5,  off: null, a: "a-11" },
    { src: "images/026.jpg", w: 7,  off: 6,    a: "a-11" },
    { src: "images/027.jpg", w: 8,  off: 3,    a: "a-11" },
    { src: "images/028.jpg", w: 5,  off: 4,    a: "a-23" },
  ];

  // -------- render stream --------
  const streamEl = document.getElementById('stream');
  frames.forEach((f, i) => {
    const classes = ['frame', `w-${f.w}`, f.a];
    if (f.off) classes.push(`off-${f.off}`);
    const fig = document.createElement('figure');
    fig.className = classes.join(' ');
    fig.innerHTML = `
      <div class="plate" data-idx="${i}">
        <img loading="lazy" src="${f.src}" alt="">
      </div>
    `;
    streamEl.appendChild(fig);
  });

  // fade-in on load
  document.querySelectorAll('.plate img').forEach(img => {
    if (img.complete && img.naturalWidth > 0) img.classList.add('loaded');
    img.addEventListener('load', () => img.classList.add('loaded'));
    img.addEventListener('error', () => { img.style.display = 'none'; });
  });

  // -------- lightbox --------
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  let currentIdx = 0;

  function openLightbox(idx) {
    currentIdx = idx;
    lbImg.src = frames[idx].src;
    lbImg.alt = '';
    lb.classList.add('open');
    lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  function navigate(dir) {
    currentIdx = (currentIdx + dir + frames.length) % frames.length;
    openLightbox(currentIdx);
  }

  document.querySelectorAll('.plate').forEach(p => {
    p.addEventListener('click', () => openLightbox(parseInt(p.dataset.idx, 10)));
  });
  document.getElementById('lbClose').addEventListener('click', closeLightbox);
  document.getElementById('lbPrev').addEventListener('click', e => { e.stopPropagation(); navigate(-1); });
  document.getElementById('lbNext').addEventListener('click', e => { e.stopPropagation(); navigate(1); });
  lbImg.addEventListener('click', closeLightbox);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });

  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowLeft') navigate(-1);
    else if (e.key === 'ArrowRight') navigate(1);
  });
</script>

</body>
</html>
